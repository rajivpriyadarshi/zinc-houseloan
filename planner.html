<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Purchase Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="planner.css">
</head>
<body>
  <button class="back-btn" onclick="window.location.href='index.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4a7c3f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </button>
  <div class="container">
    <p class="subtitle"><span class="char">V</span><span class="char">a</span><span class="char">l</span><span class="char">u</span><span class="char">e</span><span class="char">&nbsp;</span><span class="char">o</span><span class="char">f</span><span class="char">&nbsp;</span><span class="char">y</span><span class="char">o</span><span class="char">u</span><span class="char">r</span><span class="char">&nbsp;</span><span class="char">h</span><span class="char">o</span><span class="char">u</span><span class="char">s</span><span class="char">e</span><span class="char">?</span></p>

    <div class="amount-display">
      <span class="currency char">₹</span><span id="amount-display" class="amount-value"></span>
      <input type="text" id="amount-input" class="amount-input-hidden" value="1,00,00,000">
    </div>

    <div class="slider-container">
      <input type="range" id="amount-slider" min="100000" max="100000000" value="10000000" step="100000">
    </div>

    <button class="proceed-btn" id="proceed-btn">Proceed</button>

    <div id="canvas-container"></div>
  </div>

  <script type="module" src="planner-main.js"></script>
</body>
</html>
