<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Value of Your House - Zinc</title>
  <link rel="stylesheet" href="planner.css">
</head>
<body>
  <button class="back-btn" onclick="window.location.href='index.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 19l-7-7 7-7"/>
    </svg>
  </button>

  <div class="container">
    <div class="vertical-lines"></div>

    <div class="content">
      <p class="subtitle">Value of your house?</p>
      <div class="amount-display">
        <span id="amount-display" class="amount-value">₹1.00 Cr</span>
        <input type="text" id="amount-input" class="amount-input-hidden" value="1,00,00,000">
      </div>

      <div class="slider-container">
        <input type="range" id="amount-slider" min="100000" max="100000000" value="10000000" step="100000">
      </div>

      <button class="proceed-btn" id="proceed-btn">Proceed</button>

      <div class="house-container">
        <img id="house-image" src="/houses/level4.png" alt="House" class="house-image">
        <img id="house-shadow" src="/houses/level4.png" alt="" class="house-shadow">
      </div>
    </div>
  </div>

  <script type="module" src="planner-main.js"></script>
</body>
</html>
