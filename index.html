<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zinc - Plan Your Home Purchase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <img src="/zinc_logo.png" alt="Zinc" class="logo">
    <div class="vertical-lines"></div>
    <h1 class="title">Plan your home<br>purchase</h1>
    <button class="get-started-btn" id="get-started-btn">Get started</button>
  </div>

  <!-- Login Modal -->
  <div class="login-modal-overlay" id="login-modal">
    <div class="login-modal">
      <h2 class="login-title">Sign in to continue</h2>
      <p class="login-subtitle">Enter your details to get started</p>

      <div class="login-field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>

      <div class="login-field">
        <label>Phone Number</label>
        <input type="tel" id="login-phone" placeholder="+91 98765 43210">
      </div>

      <button class="login-btn" id="login-submit">Continue</button>
      <button class="login-skip" id="login-skip">Skip for now</button>
    </div>
  </div>

  <script>
    const loginModal = document.getElementById('login-modal');

    document.getElementById('get-started-btn').addEventListener('click', () => {
      loginModal.classList.add('visible');
    });

    function proceedToPlanner() {
      sessionStorage.setItem('zinc-flow-started', 'true');
      loginModal.classList.remove('visible');
      document.body.classList.add('page-exit');
      setTimeout(() => window.location.href = 'planner.html', 400);
    }

    document.getElementById('login-submit').addEventListener('click', proceedToPlanner);
    document.getElementById('login-skip').addEventListener('click', proceedToPlanner);

    loginModal.addEventListener('click', (e) => {
      if (e.target === loginModal) {
        loginModal.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
