<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Purchase Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">
      <span class="char" style="animation-delay: 0s">H</span><span class="char" style="animation-delay: 0.05s">O</span><span class="char" style="animation-delay: 0.1s">U</span><span class="char" style="animation-delay: 0.15s">S</span><span class="char" style="animation-delay: 0.2s">E</span><span class="char" style="animation-delay: 0.25s">&nbsp;</span><span class="char" style="animation-delay: 0.3s">P</span><span class="char" style="animation-delay: 0.35s">U</span><span class="char" style="animation-delay: 0.4s">R</span><span class="char" style="animation-delay: 0.45s">C</span><span class="char" style="animation-delay: 0.5s">H</span><span class="char" style="animation-delay: 0.55s">A</span><span class="char" style="animation-delay: 0.6s">S</span><span class="char" style="animation-delay: 0.65s">E</span><br>
      <span class="char" style="animation-delay: 0.7s">P</span><span class="char" style="animation-delay: 0.75s">L</span><span class="char" style="animation-delay: 0.8s">A</span><span class="char" style="animation-delay: 0.85s">N</span><span class="char" style="animation-delay: 0.9s">N</span><span class="char" style="animation-delay: 0.95s">E</span><span class="char" style="animation-delay: 1s">R</span>
    </h1>
    <button class="get-started-btn" onclick="window.location.href='planner.html'">Get started</button>
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
