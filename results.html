<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funding Options - Zinc</title>
  <link rel="stylesheet" href="results.css">
</head>
<body>
  <div class="page-container">
    <!-- Left Column -->
    <div class="left-column">
      <button class="back-btn" id="back-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <div class="funding-info">
        <p class="funding-label">You still need</p>
        <div class="funding-amount-row">
          <h1 class="funding-amount" id="funding-amount">99.3 lacs</h1>
          <button class="funding-info-btn" id="funding-info-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4"/>
              <path d="M12 8h.01"/>
            </svg>
          </button>
        </div>
        <p class="funding-subtitle">even after taking a home loan to get in your house</p>
      </div>

      <div class="house-info">
        <div class="house-float-wrapper">
          <div class="house-badge" id="house-badge-btn">
            <span class="house-city" id="city-name">Mumbai</span> house
            <div class="house-value-row">
              <span class="house-value" id="house-value">5 Cr</span>
              <svg class="house-edit-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </div>
          </div>
          <img id="house-image" class="house-image" src="/houses/level4.png" alt="House">
        </div>
      </div>

      <div class="settings-section">
        <button class="settings-btn" id="loan-settings-btn">
          <span class="settings-label">Home loan rate</span>
          <div class="settings-right">
            <span class="settings-value" id="loan-settings-value">8.5%, 20 year, 80%</span>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>
        </button>

        <button class="settings-btn" id="construction-btn">
          <span class="settings-label">Under-construction property?</span>
          <div class="settings-right">
            <span class="settings-value" id="construction-value">No</span>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </div>
        </button>
      </div>
    </div>

    <!-- Right Column -->
    <div class="right-column">
      <h2 class="options-title" id="options-title">Here are your funding options</h2>

      <div class="best-option-section">
        <p class="section-label">Best option for you</p>
        <div class="option-card best" id="best-option">
          <!-- Filled by JS -->
        </div>
      </div>

      <div class="other-options-section">
        <p class="section-label">Other options</p>
        <div id="other-options">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Loan Settings Modal -->
  <div class="modal-overlay" id="loan-modal">
    <div class="modal">
      <h3 class="modal-title">Home Loan Settings</h3>

      <div class="modal-field">
        <label>Interest Rate</label>
        <select id="modal-loan-rate">
          <option value="0.075">7.5%</option>
          <option value="0.08">8%</option>
          <option value="0.085" selected>8.5%</option>
          <option value="0.09">9%</option>
          <option value="0.095">9.5%</option>
          <option value="0.1">10%</option>
          <option value="0.105">10.5%</option>
          <option value="0.11">11%</option>
          <option value="0.115">11.5%</option>
          <option value="0.12">12%</option>
          <option value="0.125">12.5%</option>
        </select>
      </div>

      <div class="modal-field">
        <label>Tenure (Years)</label>
        <select id="modal-loan-tenure">
          <option value="5">5 years</option>
          <option value="10">10 years</option>
          <option value="15">15 years</option>
          <option value="20" selected>20 years</option>
          <option value="25">25 years</option>
          <option value="30">30 years</option>
        </select>
      </div>

      <div class="modal-field">
        <label>LTV (Loan to Value)</label>
        <select id="modal-loan-ltv">
          <option value="0.5">50%</option>
          <option value="0.6">60%</option>
          <option value="0.7">70%</option>
          <option value="0.8" selected>80%</option>
          <option value="0.9">90%</option>
          <option value="0.95">95%</option>
        </select>
      </div>

      <div class="modal-actions">
        <button class="modal-cancel" id="loan-modal-cancel">Cancel</button>
        <button class="modal-save" id="loan-modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Construction Modal -->
  <div class="modal-overlay" id="construction-modal">
    <div class="modal">
      <h3 class="modal-title">Property Status</h3>

      <div class="modal-field">
        <label>Is this an under-construction property?</label>
        <select id="modal-construction">
          <option value="Ready" selected>No - Ready to move</option>
          <option value="Under Construction">Yes - Under construction</option>
        </select>
      </div>

      <div id="construction-extra-fields" class="construction-extra-fields">
        <div class="modal-field">
          <label>Construction Duration (Years)</label>
          <select id="modal-construction-duration">
            <option value="1">1 year</option>
            <option value="2">2 years</option>
            <option value="3" selected>3 years</option>
            <option value="4">4 years</option>
            <option value="5">5 years</option>
          </select>
        </div>

        <div class="modal-info">
          <span class="info-label">GST Rate</span>
          <span class="info-value">5%</span>
        </div>

        <div class="modal-field">
          <label>Drawdown Schedule</label>
          <div class="drawdown-grid">
            <div class="drawdown-row">
              <span>Year 0</span>
              <select id="drawdown-0">
                <option value="0.1">10%</option>
                <option value="0.2">20%</option>
                <option value="0.3" selected>30%</option>
                <option value="0.4">40%</option>
                <option value="0.5">50%</option>
              </select>
            </div>
            <div class="drawdown-row">
              <span>Year 1</span>
              <select id="drawdown-1">
                <option value="0.1">10%</option>
                <option value="0.2">20%</option>
                <option value="0.3" selected>30%</option>
                <option value="0.4">40%</option>
                <option value="0.5">50%</option>
              </select>
            </div>
            <div class="drawdown-row">
              <span>Year 2</span>
              <select id="drawdown-2">
                <option value="0.1">10%</option>
                <option value="0.2" selected>20%</option>
                <option value="0.3">30%</option>
                <option value="0.4">40%</option>
                <option value="0.5">50%</option>
              </select>
            </div>
            <div class="drawdown-row">
              <span>Year 3</span>
              <select id="drawdown-3">
                <option value="0.1">10%</option>
                <option value="0.2" selected>20%</option>
                <option value="0.3">30%</option>
                <option value="0.4">40%</option>
                <option value="0.5">50%</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-actions">
        <button class="modal-cancel" id="construction-modal-cancel">Cancel</button>
        <button class="modal-save" id="construction-modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Funding Gap Breakdown Modal -->
  <div class="modal-overlay" id="funding-breakdown-modal">
    <div class="modal">
      <h3 class="modal-title">Funding Gap Breakdown</h3>
      <div id="funding-breakdown-content"></div>
      <div class="modal-actions">
        <button class="modal-save" id="funding-breakdown-close">Close</button>
      </div>
    </div>
  </div>

  <!-- House Value Modal -->
  <div class="modal-overlay" id="house-value-modal">
    <div class="modal">
      <h3 class="modal-title">Edit House Value</h3>

      <div class="modal-field">
        <label>House Value (₹)</label>
        <input type="text" id="modal-house-value" class="modal-input">
      </div>

      <div class="modal-actions">
        <button class="modal-cancel" id="house-value-modal-cancel">Cancel</button>
        <button class="modal-save" id="house-value-modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Option Detail Modal -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal modal-large">
      <h3 class="modal-title" id="detail-modal-title">Option Details</h3>
      <div id="detail-modal-content"></div>
      <div class="modal-actions">
        <button class="modal-save" id="detail-modal-close">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="results.js"></script>
</body>
</html>
